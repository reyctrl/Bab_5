<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    ul.a {
      list-style-type: circle;
    }

    ul.b {
      list-style-type: square;
    }

    ol.c {
      list-style-type: upper-roman;
    }

    ol.d {
      list-style-type: lower-alpha;
    }
  </style>
  <body>
    <p>Contoh unordered lists:</p>
    <ul class="”a”">
      <li>Tasikmalaya</li>
      <li>Garut</li>
      <li>Bandung</li>
    </ul>
    <ul class="”b”">
      <li>Tasikmalaya</li>
      <li>Garut</li>
      <li>Bandung</li>
    </ul>
    <p>Contoh ordered lists:</p>
    <ol class="”c”">
      <li>Tasikmalaya</li>
      <li>Garut</li>
      <li>Bandung</li>
    </ol>
    <ol class="”d”">
      <li>Tasikmalaya</li>
      <li>Garut</li>
      <li>Bandung</li>
    </ol>
  </body>
</html>
